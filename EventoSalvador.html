<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eventos em Salvador — Online</title>

<style>
  body{
    background:#0d0d0d;
    color:#fff;
    font-family:Arial;
    padding:20px;
  }

  h1{ text-align:center; color:#00ffa6; }

  button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ffa6;
    color:#000;
    font-weight:bold;
    margin:8px 0;
  }

  /* formulário oculto */
  #formCard{
    display:none;
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
  }

  input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
  }

  /* lista de eventos */
  .event-list{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    margin-top:10px;
  }

  .event{
    background:#151515;
    padding:10px;
    border-radius:14px;
  }

  .event img{
    width:100%;
    border-radius:12px;
  }

  .info{
    margin-top:6px;
    font-size:14px;
  }

  .tag{ color:#00ffa6; font-weight:bold; }
</style>
</head>

<body>

<h1>Eventos em Salvador</h1>

<!-- botão para abrir o cadastro -->
<button onclick="toggleForm()">➕ Adicionar Evento</button>

<!-- formulário aparece só quando clicar -->
<div id="formCard">

  <input id="title" type="text" placeholder="Nome do evento">
  <textarea id="desc" rows="2" placeholder="Descrição (opcional)"></textarea>

  <input id="date" type="date">
  <input id="time" type="time">

  <input id="image" type="file" accept="image/*">

  <button onclick="addEvent()">Salvar Evento Online</button>
</div>

<!-- Lista aparece abaixo do botão -->
<h3>Eventos cadastrados</h3>
<div id="eventList" class="event-list"></div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCIDFHMmzGkN3HGLn-XA8ieC_5DDBvbJ7o",
  authDomain: "rifa-782a3.firebaseapp.com",
  projectId: "rifa-782a3",
  storageBucket: "rifa-782a3.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

const formCard = document.getElementById("formCard");
const eventList = document.getElementById("eventList");


// 👁️ abrir / fechar formulário
function toggleForm(){
  formCard.style.display =
    formCard.style.display === "none" ? "block" : "none";
}


// ➕ cadastrar evento
async function addEvent(){

  const title = titleInput.value;
  const desc  = descInput.value;
  const date  = dateInput.value;
  const time  = timeInput.value;
  const file  = imageInput.files[0];

  if(!title || !date || !time){
    alert("Preencha título, data e horário");
    return;
  }

  let imageUrl = "";

  if(file){
    const ref = storage.ref("eventos/" + Date.now() + "_" + file.name);
    await ref.put(file);
    imageUrl = await ref.getDownloadURL();
  }

  await db.collection("eventos").add({
    title,
    desc,
    date,
    time,
    city:"Salvador",
    image:imageUrl,
    created: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Evento publicado ✔");

  // limpar campos
  titleInput.value = "";
  descInput.value  = "";
  dateInput.value  = "";
  timeInput.value  = "";
  imageInput.value = "";

  formCard.style.display = "none";
}


// 📌 referências dos inputs
const titleInput = document.getElementById("title");
const descInput  = document.getElementById("desc");
const dateInput  = document.getElementById("date");
const timeInput  = document.getElementById("time");
const imageInput = document.getElementById("image");


// 🔄 LISTA EM TEMPO REAL (abaixo do botão)
db.collection("eventos")
  .orderBy("date","asc")
  .onSnapshot(snapshot => {

    eventList.innerHTML = "";

    snapshot.forEach(doc => {
      const e = doc.data();

      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = `
        ${e.image ? `<img src="${e.image}">` : ""}
        <div class="info">
          <p><span class="tag">📅</span> ${e.date}</p>
          <p><span class="tag">⏰</span> ${e.time}</p>
        </div>
      `;

      eventList.appendChild(div);
    });
});
</script>

</body>
</html>
